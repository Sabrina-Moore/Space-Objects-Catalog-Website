<!doctype html>
<html>
  <head>
    <title>SOLAR SYSTEM PLANETARY BODIES</title>
    <meta name="description" content="A catalog of planets, satellites and man-made objects in our solar system" />
    <link rel="stylesheet" href="style.css" />
    <script src="scripts.js" defer></script>
  </head>

  <body>
    <!--main header on page-->
    <header class="main-header">
      <h1 class="title">Earth's Solar System</h1>
    </header>
    
    <!--intro to the website-->
        <div class="intro">
      <p>Explore the eight planets and their largest moons. The search bar can filter by name, classification, surface type and parent planet. </p>
    </div>

    <!--search bar and filter -->
    <div class="search_wrapper">
      <label for="search">Search</label>
      <input type="search" id="search" placeholder="Search planets or moons...">
      
      <!--drop down filter button-->
     <!-- <select onchange="applyFilter(this.value)">
        <option value="all">All</option>
        <option value="planets">Planets</option>
        <option value="moons">Moons</option>
        <option value="Terrestrial">Planets</option>
        <option value="Gas">Planets</option>
        <option value="Ice">Planets</option>
      </select> -->
    </div>


    <!--shared container-->
    <div id="card-container"></div>

q<!--container displaying the planet objects-->
    <div class="card" id="planet-template" style="display: none">
      <div class="card-content">
        <!--removed built in bullet points and added placeholders for planet data-->
        <h2></h2>
        <img alt="" />
        <p class="type">CLASSIFICATION: <span></span></p>
        <p class="surface">SURFACE TYPE: <span></span></p>
        <p class="moons">NUMBER OF MOONS: <span></span></p>
        <p class="day_length">DAY LENGTH: <span></span></p>
        <ul class="planet-info"></ul>
      </div>
    </div>

    <!--container displaying the moon objects-->
    <div class="card" id="moon-template" style="display: none">
      <div class="card-content">
        <h2></h2>
        <img alt="" />
        <p class="type">CLASSIFICATION: <span></span></p>
        <p class="parent_planet">PARENT PLANET: <span></span></p>
        <p class="surface">SURFACE: <span></span></p>
        <ul class="planet-info"></ul>
      </div>
    </div>

    <!--footer and buttons on page-->
    <div class="footer">
      <!--Button that goes straight to NASA home page-->
      <button onclick="NasaLink()">NASA Homepage</button>
    </div>
  </body>
</html>
